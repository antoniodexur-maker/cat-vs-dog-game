<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cat vs Dog Game</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#344d61,#070707 72%);color:#fff;overflow-x:hidden}.app{min-height:100svh;width:min(1180px,100vw);margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:10px}.title{text-align:center;margin:0;font-size:clamp(22px,5vw,44px);text-shadow:0 0 18px #00e5ff}.top-heads{display:flex;justify-content:space-between;gap:8px}.head-card{width:49%;display:flex;align-items:center;gap:8px;padding:7px;border:2px solid #00e5ff;border-radius:18px;background:rgba(0,0,0,.48);box-shadow:0 0 16px rgba(0,229,255,.45)}.head-card.dog{flex-direction:row-reverse;border-color:#ffeb3b;box-shadow:0 0 16px rgba(255,235,59,.45)}.head{font-size:clamp(42px,9vw,74px);line-height:1;animation:alive 2.2s ease-in-out infinite}.dog .head{animation-delay:.4s}.bubble{flex:1;background:#fff;color:#111;border-radius:14px;padding:8px;min-height:38px;font-weight:900;font-size:clamp(12px,2.4vw,16px);box-shadow:0 4px 0 rgba(0,0,0,.35)}@keyframes alive{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-4px) rotate(-3deg)}55%{transform:translateY(1px) rotate(3deg)}}.game-wrap{display:grid;grid-template-columns:1fr;justify-items:center}.board-shell{width:min(96vw,620px);position:relative;border:clamp(3px,.8vw,6px) solid #00e5ff;border-radius:28px;padding:clamp(10px,2vw,18px);background:linear-gradient(180deg,rgba(0,229,255,.14),rgba(0,0,0,.82));box-shadow:0 0 30px #00e5ff,inset 0 0 24px rgba(0,229,255,.25);overflow:hidden}.board-header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}.score-box{border:2px solid #ffeb3b;border-radius:14px;padding:6px;background:rgba(0,0,0,.5);text-align:center;font-weight:900;box-shadow:0 0 12px rgba(255,235,59,.45)}.score-box span{font-size:clamp(20px,5vw,28px)}#statusText{color:#ffeb3b;font-weight:900;text-align:center;text-shadow:0 0 10px rgba(255,235,59,.7);min-width:90px}.stage{height:clamp(86px,18vh,140px);position:relative;margin:2px 0 8px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(0,0,0,.28));overflow:hidden;border:1px solid rgba(255,255,255,.12)}.pet{position:absolute;bottom:4px;font-size:clamp(54px,13vw,100px);line-height:1;filter:drop-shadow(0 6px 6px rgba(0,0,0,.55));transition:left .45s ease,transform .25s ease}.pet.cat{left:10%}.pet.dog{right:10%}.pet.face-only{font-size:clamp(60px,14vw,105px)}.pet.hidden-body::after{content:"";position:absolute;inset:48% -10% -20%;background:linear-gradient(180deg,transparent,#101010 55%)}.prop{position:absolute;font-size:clamp(26px,6vw,46px);opacity:0;pointer-events:none}.prop.show{animation:propFly 1.4s ease-in-out}.laser{position:absolute;height:4px;width:55%;background:linear-gradient(90deg,transparent,red,#ff8080);box-shadow:0 0 14px red;left:16%;top:55%;opacity:0;transform:rotate(-8deg)}.laser.show{animation:laser .9s ease-in-out}.electric-label{text-align:center;color:#00e5ff;margin-bottom:7px;letter-spacing:4px;font-weight:900;text-shadow:0 0 12px #00e5ff}.board{--size:min(88vw,50vh,520px);position:relative;width:var(--size);height:var(--size);display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:clamp(7px,1.4vw,12px);margin:0 auto}.cell{position:relative;z-index:3;background:rgba(14,14,14,.93);border:3px solid #00e5ff;border-radius:18px;color:white;font-size:clamp(42px,12vw,78px);cursor:pointer;transition:transform .12s,background .12s,box-shadow .12s;box-shadow:inset 0 0 14px rgba(0,229,255,.28);display:grid;place-items:center}.cell:hover{background:#252525;transform:scale(1.04);box-shadow:0 0 20px #00e5ff,inset 0 0 14px rgba(0,229,255,.45)}.cell.played{animation:cellPop .38s ease}.cell .mark{display:inline-block;animation:markBorn .5s cubic-bezier(.2,1.8,.3,1)}@keyframes cellPop{50%{transform:scale(1.08);box-shadow:0 0 30px #ffeb3b}}@keyframes markBorn{0%{transform:scale(0) rotate(-180deg);opacity:0}70%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1) rotate(0);opacity:1}}.zapline{position:absolute;z-index:1;pointer-events:none;overflow:visible;opacity:.95;filter:drop-shadow(0 0 7px #fff) drop-shadow(0 0 14px #00e5ff)}.zapline svg{width:100%;height:100%;overflow:visible}.zapline polyline{fill:none;stroke:#eaffff;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:12 18;animation:dash .48s linear infinite}.zapline.h{left:1%;width:98%;height:24px}.zapline.v{top:1%;width:24px;height:98%}.zapline.h.one{top:31%}.zapline.h.two{top:65%;animation-delay:.2s}.zapline.v.one{left:31%;animation-delay:.12s}.zapline.v.two{left:65%;animation-delay:.32s}@keyframes dash{to{stroke-dashoffset:-36}}.spark{position:absolute;z-index:2;width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff,0 0 22px #00e5ff,0 0 36px #ffeb3b;pointer-events:none;opacity:0;animation:spark 2.1s infinite}.s1{left:31%;top:31%}.s2{left:65%;top:31%;animation-delay:.5s}.s3{left:31%;top:65%;animation-delay:1s}.s4{left:65%;top:65%;animation-delay:1.45s}@keyframes spark{0%,80%,100%{opacity:0;transform:scale(.4)}85%{opacity:1;transform:scale(1.8)}90%{opacity:.4;transform:scale(.7)}}.controls{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-top:12px}.controls button{background:#00e5ff;border:none;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #007b8c}.controls button:active{transform:translateY(3px);box-shadow:0 2px 0 #007b8c}.coin-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}.coin-overlay.show{display:flex}.coin{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff7b0,#ffcc33 45%,#9a6500 100%);color:#111;display:grid;place-items:center;font-size:70px;border:6px solid #fff0a3;box-shadow:0 0 40px #ffeb3b;animation:coinDrop 1s ease-in forwards}@keyframes coinDrop{0%{transform:translateY(-55vh) rotateY(0) scale(.65)}55%{transform:translateY(4vh) rotateY(1080deg) scale(1.12)}75%{transform:translateY(-5vh) rotateY(1320deg) scale(.98)}100%{transform:translateY(0) rotateY(1440deg) scale(1)}}.lick{animation:lick .9s}.scratch{animation:scratch .85s}.bark{animation:bark .6s}.angry{animation:angry .65s}.jump{animation:jump .75s}.run{animation:run 1s}.shock{animation:shock .52s;filter:brightness(2.5) drop-shadow(0 0 20px #00e5ff)}.eyes{animation:eyes .85s}@keyframes lick{30%{transform:rotate(-12deg) translateY(8px) scale(1.05)}60%{transform:rotate(-6deg) translateY(3px)}}@keyframes scratch{20%{transform:rotate(8deg) translateX(6px)}40%{transform:rotate(-8deg) translateX(-6px)}60%{transform:rotate(8deg) translateX(6px)}}@keyframes bark{30%{transform:scale(1.18) translateY(-5px)}55%{transform:scale(.95)}}@keyframes angry{20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}@keyframes jump{45%{transform:translateY(-26px) scale(1.06)}}@keyframes run{0%{transform:translateX(0)}35%{transform:translateX(52px) rotate(7deg)}70%{transform:translateX(-30px) rotate(-7deg)}100%{transform:translateX(0)}}@keyframes shock{20%{transform:translateX(-10px) rotate(-10deg) scale(1.08)}40%{transform:translateX(10px) rotate(10deg) scale(1.04)}60%{transform:translateX(-8px) rotate(-8deg) scale(1.08)}80%{transform:translateX(8px) rotate(8deg) scale(1.04)}}@keyframes eyes{0%,100%{transform:scale(1)}35%{transform:scale(1.35) translateY(-4px);filter:drop-shadow(0 0 18px #ffeb3b)}}@keyframes propFly{0%{opacity:0;transform:translate(-30px,20px) scale(.4) rotate(0)}25%{opacity:1}100%{opacity:0;transform:translate(150px,-38px) scale(1.1) rotate(360deg)}}@keyframes laser{0%,100%{opacity:0}20%,70%{opacity:1}}@media(max-width:700px){.app{justify-content:flex-start}.top-heads{position:sticky;top:0;z-index:8}.board-header{grid-template-columns:1fr}.board{--size:min(92vw,45vh,430px)}.controls button{flex:1 1 128px}.stage{height:112px}.pet.cat{left:7%}.pet.dog{right:7%}}
</style>
</head>
<body>
<div class="coin-overlay" id="coinOverlay"><div class="coin" id="coin">🐱</div></div>
<main class="app">
<h1 class="title">Cat vs Dog</h1>
<section class="top-heads">
<div class="head-card cat"><div class="head" id="catHead">🐱</div><div class="bubble" id="catSpeech">Мяу?</div></div>
<div class="head-card dog"><div class="head" id="dogHead">🐶</div><div class="bubble" id="dogSpeech">Гав!</div></div>
</section>
<section class="game-wrap"><div class="board-shell">
<div class="board-header"><div class="score-box">🐱 Cat<br><span id="catScore">0</span></div><div id="statusText">Новая партия</div><div class="score-box">🐶 Dog<br><span id="dogScore">0</span></div></div>
<div class="stage"><div class="laser" id="laser"></div><div class="prop" id="prop">🦴</div><div class="pet cat face-only hidden-body" id="catPet">🐱</div><div class="pet dog face-only hidden-body" id="dogPet">🐶</div></div>
<div class="electric-label">HIGH VOLTAGE</div>
<div class="board" id="board">
<div class="zapline h one"><svg viewBox="0 0 100 20" preserveAspectRatio="none"><polyline points="0,10 8,2 16,15 25,5 33,14 45,3 58,16 70,6 82,13 100,7"/></svg></div><div class="zapline h two"><svg viewBox="0 0 100 20" preserveAspectRatio="none"><polyline points="0,8 10,16 20,4 31,14 43,5 54,15 68,3 80,14 91,6 100,11"/></svg></div><div class="zapline v one"><svg viewBox="0 0 20 100" preserveAspectRatio="none"><polyline points="10,0 3,8 15,18 5,29 14,40 4,52 16,66 6,78 13,88 8,100"/></svg></div><div class="zapline v two"><svg viewBox="0 0 20 100" preserveAspectRatio="none"><polyline points="8,0 16,11 4,21 15,34 5,45 14,57 3,70 15,82 6,92 12,100"/></svg></div><div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div><div class="spark s4"></div>
<button class="cell" data-index="0"></button><button class="cell" data-index="1"></button><button class="cell" data-index="2"></button><button class="cell" data-index="3"></button><button class="cell" data-index="4"></button><button class="cell" data-index="5"></button><button class="cell" data-index="6"></button><button class="cell" data-index="7"></button><button class="cell" data-index="8"></button>
</div>
<div class="controls"><button id="newGameBtn">🎲 Новая партия</button><button id="modeBtn">Режим: против AI</button><button id="difficultyBtn">AI: простой</button><button id="resetScoreBtn">Сброс счёта</button></div>
</div></section></main>
<script>
const cells=document.querySelectorAll('.cell'),statusText=document.getElementById('statusText'),newGameBtn=document.getElementById('newGameBtn'),modeBtn=document.getElementById('modeBtn'),difficultyBtn=document.getElementById('difficultyBtn'),resetScoreBtn=document.getElementById('resetScoreBtn'),catScoreEl=document.getElementById('catScore'),dogScoreEl=document.getElementById('dogScore'),catHead=document.getElementById('catHead'),dogHead=document.getElementById('dogHead'),catSpeech=document.getElementById('catSpeech'),dogSpeech=document.getElementById('dogSpeech'),catPet=document.getElementById('catPet'),dogPet=document.getElementById('dogPet'),coinOverlay=document.getElementById('coinOverlay'),coin=document.getElementById('coin'),prop=document.getElementById('prop'),laser=document.getElementById('laser');
let boardState=Array(9).fill(''),currentPlayer='🐱',gameOver=false,vsAI=true,aiLevel=0,scores={cat:0,dog:0};const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function anim(el,cls,d=900){el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),d)}
function setFullBodies(){catPet.classList.remove('face-only','hidden-body');dogPet.classList.remove('face-only','hidden-body');catPet.textContent='🐈';dogPet.textContent='🐕'}function setFaces(){catPet.classList.add('face-only','hidden-body');dogPet.classList.add('face-only','hidden-body');catPet.textContent='🐱';dogPet.textContent='🐶'}
function idle(){if(gameOver)return;let r=Math.random();if(r<.18){catSpeech.textContent='Лапу помою.';anim(catPet,'lick')}else if(r<.34){dogSpeech.textContent='За ухом чешется.';anim(dogPet,'scratch')}else if(r<.50){dogSpeech.textContent='Кость моя!';prop.textContent='🦴';prop.style.left='60%';prop.style.top='48%';prop.classList.add('show');anim(dogPet,'run',1000);setTimeout(()=>prop.classList.remove('show'),1400)}else if(r<.66){catSpeech.textContent='Где красная точка?';laser.classList.add('show');anim(catPet,'run',1000);setTimeout(()=>laser.classList.remove('show'),950)}else if(r<.82){dogSpeech.textContent='Гав!';anim(dogPet,'bark')}else{catSpeech.textContent='Мрр...';anim(catPet,'jump')}}setInterval(idle,2300);
function shock(who){if(Math.random()>.28)return;anim(who==='cat'?catPet:dogPet,'shock',560);if(who==='cat'){catSpeech.textContent='МЯЯЯУ⚡';anim(catHead,'shock',560)}else{dogSpeech.textContent='ГАААВ⚡';anim(dogHead,'shock',560)}}
function status(){statusText.textContent=`Ход: ${currentPlayer}`}
function startGame(){boardState=Array(9).fill('');gameOver=true;cells.forEach(c=>{c.innerHTML='';c.classList.remove('played')});setFaces();currentPlayer=Math.random()<.5?'🐱':'🐶';coin.textContent=currentPlayer;coinOverlay.classList.add('show');statusText.textContent='Бросаем монетку...';catSpeech.textContent='Сначала только морды...';dogSpeech.textContent='Кто первый?';setTimeout(()=>{coinOverlay.classList.remove('show');setFullBodies();anim(catPet,'jump');anim(dogPet,'bark');gameOver=false;statusText.textContent=`${currentPlayer} ходит первым!`;catSpeech.textContent=currentPlayer==='🐱'?'Я первый!':'Жду...';dogSpeech.textContent=currentPlayer==='🐶'?'Я первый!':'Давай уже!';if(vsAI&&currentPlayer==='🐶')setTimeout(aiMove,650)},1250)}
function win(p){return wins.some(a=>a.every(i=>boardState[i]===p))}function draw(){return boardState.every(Boolean)}
function finish(w){gameOver=true;if(w==='🐱'){scores.cat++;catScoreEl.textContent=scores.cat;statusText.textContent='🐱 Cat победил!';catSpeech.textContent='Ха-ха!';dogSpeech.textContent='Глаза из орбит!';anim(catPet,'jump');anim(dogHead,'eyes');anim(dogPet,'angry')}else{scores.dog++;dogScoreEl.textContent=scores.dog;statusText.textContent='🐶 Dog победил!';dogSpeech.textContent='Гав-гав!';catSpeech.textContent='Мои глаза!';anim(dogPet,'jump');anim(catHead,'eyes');anim(catPet,'angry')}}
function move(i){if(boardState[i]||gameOver)return;boardState[i]=currentPlayer;cells[i].innerHTML=`<span class="mark">${currentPlayer}</span>`;cells[i].classList.add('played');setTimeout(()=>cells[i].classList.remove('played'),420);if(currentPlayer==='🐱'){catSpeech.textContent='Сюда!';dogSpeech.textContent='Не туда!';anim(catPet,'lick');shock('cat')}else{dogSpeech.textContent='Твой ход!';catSpeech.textContent='Смотри лучше!';anim(dogPet,'bark');shock('dog')}if(win(currentPlayer))return finish(currentPlayer);if(draw()){gameOver=true;statusText.textContent='Ничья!';catSpeech.textContent='Мур.';dogSpeech.textContent='Ладно.';return}currentPlayer=currentPlayer==='🐱'?'🐶':'🐱';status();if(vsAI&&currentPlayer==='🐶')setTimeout(aiMove,520)}
function free(){return boardState.map((v,i)=>v===''?i:null).filter(v=>v!==null)}function findWin(p){for(const a of wins){const vals=a.map(i=>boardState[i]);if(vals.filter(v=>v===p).length===2&&vals.includes(''))return a[vals.indexOf('')]}return null}function minimax(player){const human='🐱',ai='🐶';if(win(ai))return{score:10};if(win(human))return{score:-10};if(draw())return{score:0};let moves=[];for(const i of free()){boardState[i]=player;let res=minimax(player===ai?human:ai);moves.push({i,score:res.score});boardState[i]=''}return player===ai?moves.reduce((a,b)=>b.score>a.score?b:a):moves.reduce((a,b)=>b.score<a.score?b:a)}
function aiMove(){let f=free(),m=null;if(!f.length)return;if(aiLevel===0){m=f[Math.floor(Math.random()*f.length)]}else if(aiLevel===1){m=findWin('🐶')??findWin('🐱')??(boardState[4]===''?4:null)??f[Math.floor(Math.random()*f.length)]}else{m=minimax('🐶').i}move(m)}
cells.forEach(c=>c.addEventListener('click',()=>{if(vsAI&&currentPlayer==='🐶')return;move(Number(c.dataset.index))}));newGameBtn.onclick=startGame;modeBtn.onclick=()=>{vsAI=!vsAI;modeBtn.textContent=vsAI?'Режим: против AI':'Режим: 1 vs 1';startGame()};difficultyBtn.onclick=()=>{aiLevel=(aiLevel+1)%3;difficultyBtn.textContent=['AI: простой','AI: умный','AI: злой'][aiLevel];startGame()};resetScoreBtn.onclick=()=>{scores={cat:0,dog:0};catScoreEl.textContent=0;dogScoreEl.textContent=0};startGame();
</script>
</body>
</html>
