<!doctype html><html lang="ru"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Cat vs Dog Game</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#344d61,#070707 72%);color:#fff;overflow-x:hidden}.app{min-height:100svh;width:min(1100px,100vw);margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:10px}.title{text-align:center;margin:0;font-size:clamp(22px,5vw,44px);text-shadow:0 0 18px #00e5ff}.game-wrap{display:grid;justify-items:center}.board-shell{width:min(96vw,640px);position:relative;border:clamp(3px,.8vw,6px) solid #00e5ff;border-radius:28px;padding:clamp(10px,2vw,18px);background:linear-gradient(180deg,rgba(0,229,255,.14),rgba(0,0,0,.84));box-shadow:0 0 30px #00e5ff,inset 0 0 24px rgba(0,229,255,.25);overflow:hidden}.board-header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}.score-box{border:2px solid #ffeb3b;border-radius:16px;padding:7px;background:rgba(0,0,0,.52);text-align:center;font-weight:900;box-shadow:0 0 12px rgba(255,235,59,.45);overflow:hidden}.score-face{display:inline-block;font-size:clamp(28px,7vw,54px);line-height:1;animation:blinkEmoji 3.2s infinite}.score-box.dog .score-face{animation-delay:1s}.score-box.win .score-face{animation:happy .75s}.score-box.lose .score-face{animation:eyes .9s}.score-num{display:block;font-size:clamp(20px,5vw,30px);color:#ffeb3b}#statusText{color:#ffeb3b;font-weight:900;text-align:center;text-shadow:0 0 10px rgba(255,235,59,.7);min-width:90px}.electric-label{text-align:center;color:#00e5ff;margin-bottom:7px;letter-spacing:4px;font-weight:900;text-shadow:0 0 12px #00e5ff}.board{--size:min(88vw,54vh,540px);position:relative;width:var(--size);height:var(--size);display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:clamp(7px,1.4vw,12px);margin:0 auto}.cell{position:relative;z-index:3;background:rgba(14,14,14,.93);border:3px solid #00e5ff;border-radius:18px;color:white;cursor:pointer;transition:.12s;box-shadow:inset 0 0 14px rgba(0,229,255,.28);display:grid;place-items:center;overflow:hidden}.cell:hover{background:#252525;transform:scale(1.04);box-shadow:0 0 20px #00e5ff,inset 0 0 14px rgba(0,229,255,.45)}.cell.played{animation:cellPop .38s ease}.cell.fadeout{animation:fadeOut .8s forwards}.cell.win-cell{box-shadow:0 0 28px #ffeb3b,inset 0 0 18px rgba(255,235,59,.55);border-color:#ffeb3b}.anime-face{--fur:#ffbd57;--fur2:#ff8a00;--eye:#32e7ff;--cheek:#ff7ab7;position:relative;width:76%;height:76%;border-radius:46% 46% 42% 42%;background:radial-gradient(circle at 32% 24%,#fff8c9 0 8%,transparent 9%),linear-gradient(145deg,var(--fur),var(--fur2));box-shadow:inset -8px -10px 0 rgba(0,0,0,.12),0 0 18px rgba(255,235,59,.45);animation:faceIdle 2.4s ease-in-out infinite;transform-origin:50% 75%}.anime-face.cat{--fur:#ffcf62;--fur2:#ff7a00;--eye:#38f1ff}.anime-face.dog{--fur:#a879ff;--fur2:#5630d8;--eye:#ffeb3b;border-radius:48% 48% 44% 44%}.anime-face:before,.anime-face:after{content:"";position:absolute;top:-18%;width:34%;height:36%;background:linear-gradient(145deg,var(--fur),var(--fur2));z-index:-1}.anime-face.cat:before{left:7%;clip-path:polygon(50% 0,0 100%,100% 100%)}.anime-face.cat:after{right:7%;clip-path:polygon(50% 0,0 100%,100% 100%)}.anime-face.dog:before{left:-8%;top:5%;height:46%;border-radius:50%;transform:rotate(-25deg)}.anime-face.dog:after{right:-8%;top:5%;height:46%;border-radius:50%;transform:rotate(25deg)}.eye{position:absolute;top:34%;width:19%;height:25%;background:radial-gradient(circle at 35% 28%,#fff 0 16%,transparent 17%),var(--eye);border:3px solid #111;border-radius:50%;box-shadow:0 0 12px var(--eye);animation:blink 3.6s infinite}.eye.l{left:25%}.eye.r{right:25%}.nose{position:absolute;left:50%;top:59%;width:11%;height:8%;background:#171717;border-radius:50%;transform:translateX(-50%)}.mouth{position:absolute;left:50%;top:70%;width:30%;height:13%;border-bottom:4px solid #151515;border-radius:50%;transform:translateX(-50%)}.cheek{position:absolute;top:60%;width:16%;height:10%;background:var(--cheek);border-radius:50%;opacity:.7}.cheek.l{left:12%}.cheek.r{right:12%}.cell.preview .anime-face{filter:saturate(1.25);animation:previewPulse 1.5s infinite}.cell.scene-angry .anime-face{animation:angry .65s}.cell.scene-shock .anime-face{animation:shock .55s;filter:brightness(2.4) drop-shadow(0 0 18px #00e5ff)}.cell.scene-happy .anime-face{animation:happyFace .75s}.cell.scene-eyes .anime-face{animation:eyesFace .85s}.cell.scene-laser:after{content:"";position:absolute;height:4px;width:80%;left:10%;top:60%;background:linear-gradient(90deg,transparent,red,#ff9090);box-shadow:0 0 12px red;transform:rotate(-12deg);animation:laser .9s}.zapline{position:absolute;z-index:1;pointer-events:none;overflow:visible;opacity:.95;filter:drop-shadow(0 0 7px #fff) drop-shadow(0 0 14px #00e5ff)}.zapline svg{width:100%;height:100%;overflow:visible}.zapline polyline{fill:none;stroke:#eaffff;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:12 18;animation:dash .48s linear infinite}.zapline.h{left:1%;width:98%;height:24px}.zapline.v{top:1%;width:24px;height:98%}.zapline.h.one{top:31%}.zapline.h.two{top:65%;animation-delay:.2s}.zapline.v.one{left:31%;animation-delay:.12s}.zapline.v.two{left:65%;animation-delay:.32s}.victory-svg{position:absolute;inset:0;z-index:8;pointer-events:none;overflow:visible}.victory-svg polyline{fill:none;stroke:#fff75a;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 8px #fff) drop-shadow(0 0 18px #00e5ff) drop-shadow(0 0 26px #ffeb3b);stroke-dasharray:26 18;animation:victoryRun .32s linear infinite}.victory-svg.freeze polyline{stroke-dasharray:none;animation:none;stroke:#ffeb3b}.victory-svg.hidden{display:none}@keyframes victoryRun{to{stroke-dashoffset:-44}}@keyframes dash{to{stroke-dashoffset:-36}}.spark{position:absolute;z-index:2;width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff,0 0 22px #00e5ff,0 0 36px #ffeb3b;pointer-events:none;opacity:0;animation:spark 2.1s infinite}.s1{left:31%;top:31%}.s2{left:65%;top:31%;animation-delay:.5s}.s3{left:31%;top:65%;animation-delay:1s}.s4{left:65%;top:65%;animation-delay:1.45s}.controls{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-top:12px}.controls button{background:#00e5ff;border:none;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #007b8c}.controls button:active{transform:translateY(3px);box-shadow:0 2px 0 #007b8c}.coin-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}.coin-overlay.show{display:flex}.coin{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff7b0,#ffcc33 45%,#9a6500 100%);color:#111;display:grid;place-items:center;font-size:70px;border:6px solid #fff0a3;box-shadow:0 0 40px #ffeb3b;animation:coinDrop 1.25s ease-in forwards}@keyframes coinDrop{0%{transform:translateY(-55vh) rotateY(0) scale(.65)}55%{transform:translateY(4vh) rotateY(1080deg) scale(1.12)}75%{transform:translateY(-5vh) rotateY(1320deg) scale(.98)}100%{transform:translateY(0) rotateY(1440deg) scale(1)}}@keyframes blinkEmoji{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.18)}}@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.08)}}@keyframes faceIdle{0%,100%{transform:translateY(0) rotate(0)}45%{transform:translateY(-5px) rotate(-2deg)}70%{transform:translateY(2px) rotate(2deg)}}@keyframes previewPulse{50%{transform:scale(1.08);filter:saturate(1.5) brightness(1.12)}}@keyframes cellPop{50%{transform:scale(1.08);box-shadow:0 0 30px #ffeb3b}}@keyframes angry{20%{transform:translateX(-8px) rotate(-5deg)}40%{transform:translateX(8px) rotate(5deg)}60%{transform:translateX(-6px) rotate(-4deg)}80%{transform:translateX(6px) rotate(4deg)}}@keyframes shock{20%{transform:translateX(-8px) rotate(-10deg) scale(1.08)}40%{transform:translateX(8px) rotate(10deg) scale(1.04)}60%{transform:translateX(-6px) rotate(-8deg) scale(1.08)}80%{transform:translateX(6px) rotate(8deg) scale(1.04)}}@keyframes happy{45%{transform:translateY(-8px) scale(1.15)}}@keyframes happyFace{45%{transform:translateY(-18px) scale(1.14) rotate(6deg)}}@keyframes eyes{35%{transform:scale(1.42) translateY(-5px);filter:drop-shadow(0 0 18px #ffeb3b)}}@keyframes eyesFace{35%{transform:scale(1.24) translateY(-8px);filter:brightness(1.3) drop-shadow(0 0 22px #ffeb3b)}}@keyframes laser{0%,100%{opacity:0}20%,70%{opacity:1}}@keyframes spark{0%,80%,100%{opacity:0;transform:scale(.4)}85%{opacity:1;transform:scale(1.8)}90%{opacity:.4;transform:scale(.7)}}@keyframes fadeOut{to{opacity:.08;filter:grayscale(1);transform:scale(.82)}}@media(max-width:700px){.board-header{grid-template-columns:1fr}.board{--size:min(92vw,50vh,450px)}.controls button{flex:1 1 128px}.score-face{font-size:42px}}</style></head><body><div class="coin-overlay" id="coinOverlay"><div class="coin" id="coin">🐱</div></div><main class="app"><h1 class="title">Cat vs Dog</h1><section class="game-wrap"><div class="board-shell"><div class="board-header"><div class="score-box cat" id="catScoreBox"><span class="score-face">🐱</span><span>Cat</span><span class="score-num" id="catScore">0</span></div><div id="statusText">Новая партия</div><div class="score-box dog" id="dogScoreBox"><span class="score-face">🐶</span><span>Dog</span><span class="score-num" id="dogScore">0</span></div></div><div class="electric-label">HIGH VOLTAGE</div><div class="board" id="board"><svg class="victory-svg hidden" id="victorySvg" viewBox="0 0 100 100" preserveAspectRatio="none"><polyline id="victoryLine" points=""/></svg><div class="zapline h one"><svg viewBox="0 0 100 20" preserveAspectRatio="none"><polyline points="0,10 8,2 16,15 25,5 33,14 45,3 58,16 70,6 82,13 100,7"/></svg></div><div class="zapline h two"><svg viewBox="0 0 100 20" preserveAspectRatio="none"><polyline points="0,8 10,16 20,4 31,14 43,5 54,15 68,3 80,14 91,6 100,11"/></svg></div><div class="zapline v one"><svg viewBox="0 0 20 100" preserveAspectRatio="none"><polyline points="10,0 3,8 15,18 5,29 14,40 4,52 16,66 6,78 13,88 8,100"/></svg></div><div class="zapline v two"><svg viewBox="0 0 20 100" preserveAspectRatio="none"><polyline points="8,0 16,11 4,21 15,34 5,45 14,57 3,70 15,82 6,92 12,100"/></svg></div><div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div><div class="spark s4"></div><button class="cell" data-index="0"></button><button class="cell" data-index="1"></button><button class="cell" data-index="2"></button><button class="cell" data-index="3"></button><button class="cell" data-index="4"></button><button class="cell" data-index="5"></button><button class="cell" data-index="6"></button><button class="cell" data-index="7"></button><button class="cell" data-index="8"></button></div><div class="controls"><button id="newGameBtn">🎲 Новая партия</button><button id="modeBtn">Режим: против AI</button><button id="difficultyBtn">AI: простой</button><button id="resetScoreBtn">Сброс счёта</button></div></div></section></main><script>const cells=document.querySelectorAll('.cell'),statusText=document.getElementById('statusText'),newGameBtn=document.getElementById('newGameBtn'),modeBtn=document.getElementById('modeBtn'),difficultyBtn=document.getElementById('difficultyBtn'),resetScoreBtn=document.getElementById('resetScoreBtn'),catScoreEl=document.getElementById('catScore'),dogScoreEl=document.getElementById('dogScore'),catScoreBox=document.getElementById('catScoreBox'),dogScoreBox=document.getElementById('dogScoreBox'),coinOverlay=document.getElementById('coinOverlay'),coin=document.getElementById('coin'),victorySvg=document.getElementById('victorySvg'),victoryLine=document.getElementById('victoryLine');let boardState=Array(9).fill(''),currentPlayer='🐱',gameOver=false,vsAI=true,aiLevel=0,scores={cat:0,dog:0},roundStarted=false;const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]],centers=[[16.7,16.7],[50,16.7],[83.3,16.7],[16.7,50],[50,50],[83.3,50],[16.7,83.3],[50,83.3],[83.3,83.3]];function face(t){return `<div class="anime-face ${t}"><span class="eye l"></span><span class="eye r"></span><span class="cheek l"></span><span class="cheek r"></span><span class="nose"></span><span class="mouth"></span></div>`}function free(){return boardState.map((v,i)=>v===''?i:null).filter(v=>v!==null)}function winPattern(p){return wins.find(a=>a.every(i=>boardState[i]===p))||null}function win(p){return !!winPattern(p)}function draw(){return boardState.every(Boolean)}function status(){statusText.textContent=`Ход: ${currentPlayer}`}function clearBoard(){boardState=Array(9).fill('');victorySvg.classList.add('hidden');victorySvg.classList.remove('freeze');victoryLine.setAttribute('points','');cells.forEach(c=>{c.innerHTML='';c.className='cell'})}function showFaces(){cells.forEach((c,i)=>{c.className='cell preview';c.innerHTML=face(i%2===0?'cat':'dog')})}function transformToEmpty(){cells.forEach(c=>{c.innerHTML='';c.className='cell'})}function newGame(){gameOver=true;roundStarted=false;clearBoard();showFaces();currentPlayer=Math.random()<.5?'🐱':'🐶';coin.textContent=currentPlayer;coinOverlay.classList.add('show');statusText.textContent='Бросаем монетку...';setTimeout(()=>{coinOverlay.classList.remove('show');setTimeout(()=>{transformToEmpty();gameOver=false;roundStarted=true;statusText.textContent=`${currentPlayer} ходит первым!`;if(vsAI&&currentPlayer==='🐶')setTimeout(aiMove,650)},420)},1560)}function scene(cell,type){cell.classList.add(type);setTimeout(()=>cell.classList.remove(type),950)}function randomScene(player){const owned=[...cells].filter((c,i)=>boardState[i]===player);if(!owned.length)return;const c=owned[Math.floor(Math.random()*owned.length)];scene(c,Math.random()<.2?'scene-laser':Math.random()<.5?'scene-happy':'scene-angry')}setInterval(()=>{if(!gameOver&&roundStarted)randomScene(Math.random()<.5?'🐱':'🐶')},2200);function drawVictory(pattern){const pts=pattern.map(i=>centers[i]);let jag=[];for(let a=0;a<pts.length-1;a++){const[x1,y1]=pts[a],[x2,y2]=pts[a+1];jag.push([x1,y1]);for(let s=1;s<=3;s++){let t=s/4,x=x1+(x2-x1)*t,y=y1+(y2-y1)*t;let dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1;let off=(s%2?4:-4);jag.push([x-dy/len*off,y+dx/len*off])}}jag.push(pts[pts.length-1]);victoryLine.setAttribute('points',jag.map(p=>p.join(',')).join(' '));victorySvg.classList.remove('hidden','freeze');pattern.forEach(i=>cells[i].classList.add('win-cell'));setTimeout(()=>victorySvg.classList.add('freeze'),4000);setTimeout(()=>{cells.forEach((c,i)=>{if(!pattern.includes(i))c.classList.add('fadeout')})},6000)}function finish(w){gameOver=true;const pattern=winPattern(w);if(w==='🐱'){scores.cat++;catScoreEl.textContent=scores.cat;statusText.textContent='🐱 Cat победил!';catScoreBox.classList.add('win');dogScoreBox.classList.add('lose')}else{scores.dog++;dogScoreEl.textContent=scores.dog;statusText.textContent='🐶 Dog победил!';dogScoreBox.classList.add('win');catScoreBox.classList.add('lose')}[...cells].forEach((c,i)=>{if(boardState[i]===w)scene(c,'scene-happy');else if(boardState[i])scene(c,'scene-eyes')});if(pattern)drawVictory(pattern);setTimeout(()=>{catScoreBox.classList.remove('win','lose');dogScoreBox.classList.remove('win','lose')},900)}function move(i){if(boardState[i]||gameOver)return;boardState[i]=currentPlayer;cells[i].innerHTML=face(currentPlayer==='🐱'?'cat':'dog');cells[i].className='cell played';setTimeout(()=>cells[i].classList.remove('played'),420);scene(cells[i],Math.random()<.25?'scene-shock':currentPlayer==='🐱'?'scene-happy':'scene-angry');if(win(currentPlayer))return finish(currentPlayer);if(draw()){gameOver=true;statusText.textContent='Ничья!';return}currentPlayer=currentPlayer==='🐱'?'🐶':'🐱';status();if(vsAI&&currentPlayer==='🐶')setTimeout(aiMove,520)}function findWin(p){for(const a of wins){const vals=a.map(i=>boardState[i]);if(vals.filter(v=>v===p).length===2&&vals.includes(''))return a[vals.indexOf('')]}return null}function minimax(player){const human='🐱',ai='🐶';if(win(ai))return{score:10};if(win(human))return{score:-10};if(draw())return{score:0};let moves=[];for(const i of free()){boardState[i]=player;let r=minimax(player===ai?human:ai);moves.push({i,score:r.score});boardState[i]=''}return player===ai?moves.reduce((a,b)=>b.score>a.score?b:a):moves.reduce((a,b)=>b.score<a.score?b:a)}function aiMove(){let f=free(),m;if(!f.length)return;if(aiLevel===0)m=f[Math.floor(Math.random()*f.length)];else if(aiLevel===1)m=findWin('🐶')??findWin('🐱')??(boardState[4]===''?4:null)??f[Math.floor(Math.random()*f.length)];else m=minimax('🐶').i;move(m)}cells.forEach(c=>c.addEventListener('click',()=>{if(!roundStarted)return;if(vsAI&&currentPlayer==='🐶')return;move(Number(c.dataset.index))}));newGameBtn.onclick=newGame;modeBtn.onclick=()=>{vsAI=!vsAI;modeBtn.textContent=vsAI?'Режим: против AI':'Режим: 1 vs 1';statusText.textContent=vsAI?'Включен AI':'Режим 1 vs 1'};difficultyBtn.onclick=()=>{aiLevel=(aiLevel+1)%3;difficultyBtn.textContent=['AI: простой','AI: умный','AI: злой'][aiLevel];statusText.textContent=difficultyBtn.textContent};resetScoreBtn.onclick=()=>{scores={cat:0,dog:0};catScoreEl.textContent=0;dogScoreEl.textContent=0;statusText.textContent='Счёт сброшен'};newGame();</script></body></html>
