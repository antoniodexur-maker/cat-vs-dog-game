<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cat vs Dog Game</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#344d61,#070707 72%);color:#fff;overflow-x:hidden}.app{min-height:100svh;width:min(1100px,100vw);margin:0 auto;padding:10px;display:flex;flex-direction:column;justify-content:flex-start;gap:10px}.title{text-align:center;margin:0;font-size:clamp(22px,5vw,44px);text-shadow:0 0 18px #00e5ff}.game-wrap{display:grid;grid-template-columns:1fr;justify-items:center}.board-shell{width:min(96vw,640px);position:relative;border:clamp(3px,.8vw,6px) solid #00e5ff;border-radius:28px;padding:clamp(10px,2vw,18px);background:linear-gradient(180deg,rgba(0,229,255,.14),rgba(0,0,0,.84));box-shadow:0 0 30px #00e5ff,inset 0 0 24px rgba(0,229,255,.25);overflow:hidden}.board-header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}.score-box{border:2px solid #ffeb3b;border-radius:16px;padding:7px;background:rgba(0,0,0,.52);text-align:center;font-weight:900;box-shadow:0 0 12px rgba(255,235,59,.45);position:relative;overflow:hidden}.score-face{display:inline-block;font-size:clamp(28px,7vw,54px);line-height:1;animation:blink 3.2s infinite}.score-box.dog .score-face{animation-delay:1s}.score-box.win .score-face{animation:happy .75s}.score-box.lose .score-face{animation:eyes .9s}.score-num{display:block;font-size:clamp(20px,5vw,30px);color:#ffeb3b}#statusText{color:#ffeb3b;font-weight:900;text-align:center;text-shadow:0 0 10px rgba(255,235,59,.7);min-width:90px}.electric-label{text-align:center;color:#00e5ff;margin-bottom:7px;letter-spacing:4px;font-weight:900;text-shadow:0 0 12px #00e5ff}.board{--size:min(88vw,54vh,540px);position:relative;width:var(--size);height:var(--size);display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:clamp(7px,1.4vw,12px);margin:0 auto}.cell{position:relative;z-index:3;background:rgba(14,14,14,.93);border:3px solid #00e5ff;border-radius:18px;color:white;cursor:pointer;transition:transform .12s,background .12s,box-shadow .12s;box-shadow:inset 0 0 14px rgba(0,229,255,.28);display:grid;place-items:center;overflow:hidden}.cell:hover{background:#252525;transform:scale(1.04);box-shadow:0 0 20px #00e5ff,inset 0 0 14px rgba(0,229,255,.45)}.cell.played{animation:cellPop .38s ease}.mark{font-size:clamp(48px,13vw,86px);line-height:1;display:inline-block}.mark.face{animation:markBorn .45s cubic-bezier(.2,1.8,.3,1)}.mark.alive{font-size:clamp(52px,13vw,88px);animation:idlePet 2.4s infinite ease-in-out}.mark.cat.alive{filter:drop-shadow(0 5px 5px rgba(0,0,0,.5))}.mark.dog.alive{filter:drop-shadow(0 5px 5px rgba(0,0,0,.5))}.cell .mini-prop{position:absolute;font-size:clamp(18px,5vw,34px);opacity:0}.cell.scene-lick .mark{animation:lick .9s}.cell.scene-scratch .mark{animation:scratch .85s}.cell.scene-bark .mark{animation:bark .6s}.cell.scene-jump .mark{animation:jump .75s}.cell.scene-run .mark{animation:run .95s}.cell.scene-shock .mark{animation:shock .55s;filter:brightness(2.4) drop-shadow(0 0 18px #00e5ff)}.cell.scene-laser::after{content:"";position:absolute;height:4px;width:80%;left:10%;top:60%;background:linear-gradient(90deg,transparent,red,#ff9090);box-shadow:0 0 12px red;transform:rotate(-12deg);animation:laser .9s}.cell.scene-bone .mini-prop{opacity:1;animation:propFly 1.2s ease-in-out}.cell.scene-ball .mini-prop{opacity:1;animation:ballFly 1.2s ease-in-out}.zapline{position:absolute;z-index:1;pointer-events:none;overflow:visible;opacity:.95;filter:drop-shadow(0 0 7px #fff) drop-shadow(0 0 14px #00e5ff)}.zapline svg{width:100%;height:100%;overflow:visible}.zapline polyline{fill:none;stroke:#eaffff;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:12 18;animation:dash .48s linear infinite}.zapline.h{left:1%;width:98%;height:24px}.zapline.v{top:1%;width:24px;height:98%}.zapline.h.one{top:31%}.zapline.h.two{top:65%;animation-delay:.2s}.zapline.v.one{left:31%;animation-delay:.12s}.zapline.v.two{left:65%;animation-delay:.32s}@keyframes dash{to{stroke-dashoffset:-36}}.spark{position:absolute;z-index:2;width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff,0 0 22px #00e5ff,0 0 36px #ffeb3b;pointer-events:none;opacity:0;animation:spark 2.1s infinite}.s1{left:31%;top:31%}.s2{left:65%;top:31%;animation-delay:.5s}.s3{left:31%;top:65%;animation-delay:1s}.s4{left:65%;top:65%;animation-delay:1.45s}@keyframes spark{0%,80%,100%{opacity:0;transform:scale(.4)}85%{opacity:1;transform:scale(1.8)}90%{opacity:.4;transform:scale(.7)}}.controls{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-top:12px}.controls button{background:#00e5ff;border:none;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #007b8c}.controls button:active{transform:translateY(3px);box-shadow:0 2px 0 #007b8c}.coin-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}.coin-overlay.show{display:flex}.coin{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff7b0,#ffcc33 45%,#9a6500 100%);color:#111;display:grid;place-items:center;font-size:70px;border:6px solid #fff0a3;box-shadow:0 0 40px #ffeb3b;animation:coinDrop 1.25s ease-in forwards}@keyframes coinDrop{0%{transform:translateY(-55vh) rotateY(0) scale(.65)}55%{transform:translateY(4vh) rotateY(1080deg) scale(1.12)}75%{transform:translateY(-5vh) rotateY(1320deg) scale(.98)}100%{transform:translateY(0) rotateY(1440deg) scale(1)}}@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.18)}}@keyframes happy{45%{transform:translateY(-8px) scale(1.15)}}@keyframes eyes{35%{transform:scale(1.42) translateY(-5px);filter:drop-shadow(0 0 18px #ffeb3b)}}@keyframes markBorn{0%{transform:scale(0) rotate(-180deg);opacity:0}70%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1) rotate(0);opacity:1}}@keyframes cellPop{50%{transform:scale(1.08);box-shadow:0 0 30px #ffeb3b}}@keyframes idlePet{0%,100%{transform:translateY(0) rotate(0)}45%{transform:translateY(-5px) rotate(-3deg)}70%{transform:translateY(2px) rotate(3deg)}}@keyframes lick{30%{transform:rotate(-14deg) translateY(8px) scale(1.06)}60%{transform:rotate(-6deg) translateY(3px)}}@keyframes scratch{20%{transform:rotate(8deg) translateX(6px)}40%{transform:rotate(-8deg) translateX(-6px)}60%{transform:rotate(8deg) translateX(6px)}}@keyframes bark{30%{transform:scale(1.2) translateY(-5px)}55%{transform:scale(.95)}}@keyframes jump{45%{transform:translateY(-24px) scale(1.08)}}@keyframes run{0%{transform:translateX(0)}35%{transform:translateX(24px) rotate(7deg)}70%{transform:translateX(-18px) rotate(-7deg)}100%{transform:translateX(0)}}@keyframes shock{20%{transform:translateX(-8px) rotate(-10deg) scale(1.08)}40%{transform:translateX(8px) rotate(10deg) scale(1.04)}60%{transform:translateX(-6px) rotate(-8deg) scale(1.08)}80%{transform:translateX(6px) rotate(8deg) scale(1.04)}}@keyframes laser{0%,100%{opacity:0}20%,70%{opacity:1}}@keyframes propFly{0%{transform:translate(-25px,20px) scale(.4) rotate(0)}25%{opacity:1}100%{opacity:0;transform:translate(55px,-36px) scale(1.1) rotate(360deg)}}@keyframes ballFly{0%{transform:translate(40px,20px) scale(.5) rotate(0)}25%{opacity:1}100%{opacity:0;transform:translate(-55px,-30px) scale(1.1) rotate(-360deg)}}@media(max-width:700px){.app{justify-content:flex-start}.board-header{grid-template-columns:1fr}.board{--size:min(92vw,48vh,450px)}.controls button{flex:1 1 128px}.score-face{font-size:42px}}
</style>
</head>
<body>
<div class="coin-overlay" id="coinOverlay"><div class="coin" id="coin">🐱</div></div>
<main class="app"><h1 class="title">Cat vs Dog</h1><section class="game-wrap"><div class="board-shell">
<div class="board-header"><div class="score-box cat" id="catScoreBox"><span class="score-face" id="catFace">🐱</span><span>Cat</span><span class="score-num" id="catScore">0</span></div><div id="statusText">Новая партия</div><div class="score-box dog" id="dogScoreBox"><span class="score-face" id="dogFace">🐶</span><span>Dog</span><span class="score-num" id="dogScore">0</span></div></div>
<div class="electric-label">HIGH VOLTAGE</div>
<div class="board" id="board">
<div class="zapline h one"><svg viewBox="0 0 100 20" preserveAspectRatio="none"><polyline points="0,10 8,2 16,15 25,5 33,14 45,3 58,16 70,6 82,13 100,7"/></svg></div><div class="zapline h two"><svg viewBox="0 0 100 20" preserveAspectRatio="none"><polyline points="0,8 10,16 20,4 31,14 43,5 54,15 68,3 80,14 91,6 100,11"/></svg></div><div class="zapline v one"><svg viewBox="0 0 20 100" preserveAspectRatio="none"><polyline points="10,0 3,8 15,18 5,29 14,40 4,52 16,66 6,78 13,88 8,100"/></svg></div><div class="zapline v two"><svg viewBox="0 0 20 100" preserveAspectRatio="none"><polyline points="8,0 16,11 4,21 15,34 5,45 14,57 3,70 15,82 6,92 12,100"/></svg></div><div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div><div class="spark s4"></div>
<button class="cell" data-index="0"></button><button class="cell" data-index="1"></button><button class="cell" data-index="2"></button><button class="cell" data-index="3"></button><button class="cell" data-index="4"></button><button class="cell" data-index="5"></button><button class="cell" data-index="6"></button><button class="cell" data-index="7"></button><button class="cell" data-index="8"></button>
</div><div class="controls"><button id="newGameBtn">🎲 Новая партия</button><button id="modeBtn">Режим: против AI</button><button id="difficultyBtn">AI: простой</button><button id="resetScoreBtn">Сброс счёта</button></div>
</div></section></main>
<script>
const cells=document.querySelectorAll('.cell'),statusText=document.getElementById('statusText'),newGameBtn=document.getElementById('newGameBtn'),modeBtn=document.getElementById('modeBtn'),difficultyBtn=document.getElementById('difficultyBtn'),resetScoreBtn=document.getElementById('resetScoreBtn'),catScoreEl=document.getElementById('catScore'),dogScoreEl=document.getElementById('dogScore'),catScoreBox=document.getElementById('catScoreBox'),dogScoreBox=document.getElementById('dogScoreBox'),coinOverlay=document.getElementById('coinOverlay'),coin=document.getElementById('coin');
let boardState=Array(9).fill(''),currentPlayer='🐱',gameOver=false,vsAI=true,aiLevel=0,scores={cat:0,dog:0},roundStarted=false;const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function free(){return boardState.map((v,i)=>v===''?i:null).filter(v=>v!==null)}function win(p){return wins.some(a=>a.every(i=>boardState[i]===p))}function draw(){return boardState.every(Boolean)}function status(){statusText.textContent=`Ход: ${currentPlayer}`}
function clearBoard(){boardState=Array(9).fill('');cells.forEach(c=>{c.innerHTML='';c.className='cell'})}
function showFaces(){cells.forEach((c,i)=>{c.innerHTML=`<span class="mark face">${i%2===0?'🐱':'🐶'}</span>`})}
function transformToAnimals(){cells.forEach(c=>{const mark=c.querySelector('.mark');if(!mark)return;const isCat=mark.textContent==='🐱';mark.textContent=isCat?'🐈':'🐕';mark.className=`mark alive ${isCat?'cat':'dog'}`})}
function newGame(){gameOver=true;roundStarted=false;clearBoard();showFaces();currentPlayer=Math.random()<.5?'🐱':'🐶';coin.textContent=currentPlayer;coinOverlay.classList.add('show');statusText.textContent='Бросаем монетку...';setTimeout(()=>{coinOverlay.classList.remove('show');transformToAnimals();setTimeout(()=>{clearBoard();gameOver=false;roundStarted=true;statusText.textContent=`${currentPlayer} ходит первым!`;if(vsAI&&currentPlayer==='🐶')setTimeout(aiMove,650)},700)},1560)}
function startWithoutCoin(){clearBoard();gameOver=false;roundStarted=true;status();if(vsAI&&currentPlayer==='🐶')setTimeout(aiMove,500)}
function scene(cell,type,prop){cell.classList.add(type);if(prop){const p=document.createElement('span');p.className='mini-prop';p.textContent=prop;cell.appendChild(p)}setTimeout(()=>{cell.classList.remove(type);const p=cell.querySelector('.mini-prop');if(p)p.remove()},1300)}
function randomScene(player){const owned=[...cells].filter((c,i)=>boardState[i]===player);if(!owned.length)return;const c=owned[Math.floor(Math.random()*owned.length)];const cat=['scene-lick','scene-laser','scene-jump','scene-run'];const dog=['scene-scratch','scene-bark','scene-bone','scene-ball'];const arr=player==='🐱'?cat:dog;const type=arr[Math.floor(Math.random()*arr.length)];scene(c,type,type==='scene-bone'?'🦴':type==='scene-ball'?'⚽':null)}setInterval(()=>{if(!gameOver&&roundStarted){randomScene(Math.random()<.5?'🐱':'🐶')}},2200);
function finish(w){gameOver=true;if(w==='🐱'){scores.cat++;catScoreEl.textContent=scores.cat;statusText.textContent='🐱 Cat победил!';catScoreBox.classList.add('win');dogScoreBox.classList.add('lose');setTimeout(()=>{catScoreBox.classList.remove('win');dogScoreBox.classList.remove('lose')},900)}else{scores.dog++;dogScoreEl.textContent=scores.dog;statusText.textContent='🐶 Dog победил!';dogScoreBox.classList.add('win');catScoreBox.classList.add('lose');setTimeout(()=>{dogScoreBox.classList.remove('win');catScoreBox.classList.remove('lose')},900)}}
function move(i){if(boardState[i]||gameOver)return;boardState[i]=currentPlayer;cells[i].innerHTML=`<span class="mark alive ${currentPlayer==='🐱'?'cat':'dog'}">${currentPlayer==='🐱'?'🐈':'🐕'}</span>`;cells[i].classList.add('played');setTimeout(()=>cells[i].classList.remove('played'),420);scene(cells[i],currentPlayer==='🐱'?'scene-lick':'scene-bark');if(Math.random()<.22)scene(cells[i],'scene-shock');if(win(currentPlayer))return finish(currentPlayer);if(draw()){gameOver=true;statusText.textContent='Ничья!';return}currentPlayer=currentPlayer==='🐱'?'🐶':'🐱';status();if(vsAI&&currentPlayer==='🐶')setTimeout(aiMove,520)}
function findWin(p){for(const a of wins){const vals=a.map(i=>boardState[i]);if(vals.filter(v=>v===p).length===2&&vals.includes(''))return a[vals.indexOf('')]}return null}function minimax(player){const human='🐱',ai='🐶';if(win(ai))return{score:10};if(win(human))return{score:-10};if(draw())return{score:0};let moves=[];for(const i of free()){boardState[i]=player;let r=minimax(player===ai?human:ai);moves.push({i,score:r.score});boardState[i]=''}return player===ai?moves.reduce((a,b)=>b.score>a.score?b:a):moves.reduce((a,b)=>b.score<a.score?b:a)}function aiMove(){let f=free(),m;if(!f.length)return;if(aiLevel===0)m=f[Math.floor(Math.random()*f.length)];else if(aiLevel===1)m=findWin('🐶')??findWin('🐱')??(boardState[4]===''?4:null)??f[Math.floor(Math.random()*f.length)];else m=minimax('🐶').i;move(m)}
cells.forEach(c=>c.addEventListener('click',()=>{if(!roundStarted)return;if(vsAI&&currentPlayer==='🐶')return;move(Number(c.dataset.index))}));newGameBtn.onclick=newGame;modeBtn.onclick=()=>{vsAI=!vsAI;modeBtn.textContent=vsAI?'Режим: против AI':'Режим: 1 vs 1';statusText.textContent=vsAI?'Включен AI':'Режим 1 vs 1'};difficultyBtn.onclick=()=>{aiLevel=(aiLevel+1)%3;difficultyBtn.textContent=['AI: простой','AI: умный','AI: злой'][aiLevel];statusText.textContent=difficultyBtn.textContent};resetScoreBtn.onclick=()=>{scores={cat:0,dog:0};catScoreEl.textContent=0;dogScoreEl.textContent=0;statusText.textContent='Счёт сброшен'};newGame();
</script>
</body>
</html>
