<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cat vs Dog</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="coin-overlay" id="coinBox">
  <div class="coin" id="coin">🐱</div>
</div>

<main class="app">
  <h1 class="title">Cat vs Dog</h1>

  <div class="shell">

    <div class="top">
      <div class="score-box" id="catBox">
        <span class="score-face">🐱</span>
        Cat
        <span class="score-num" id="catScore">0</span>
      </div>

      <div id="status">Новая партия</div>

      <div class="score-box" id="dogBox">
        <span class="score-face">🐶</span>
        Dog
        <span class="score-num" id="dogScore">0</span>
      </div>
    </div>

    <div class="label">HIGH VOLTAGE</div>

    <div class="board" id="board">

      <svg class="victory-svg hidden" id="victorySvg" viewBox="0 0 100 100">
        <polyline id="victoryLine"></polyline>
      </svg>

      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>

      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>

      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>

    </div>

    <div class="controls">
      <button id="newGameBtn">🎲 Новая партия</button>
      <button id="modeBtn">Режим: против AI</button>
      <button id="difficultyBtn">AI: простой</button>
      <button id="resetBtn">Сброс счёта</button>
    </div>

  </div>
</main>

<script src="game.js"></script>

</body>
</html>
